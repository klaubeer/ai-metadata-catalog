<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Navigator</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 shadow-sm mb-6">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">

        <a href="/" class="flex items-center gap-2 font-bold text-gray-800 hover:text-blue-600 transition-colors">
            <span class="text-xl">&#128202;</span>
            <span>Data Navigator</span>
        </a>

        <div class="flex items-center gap-1 text-sm">
            <a href="/catalogo/"
               class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">
                Catálogo
            </a>
            <a href="/catalogo/qualidade/"
               class="px-3 py-1.5 rounded text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">
                Qualidade
            </a>
            <a href="/chat/"
               class="ml-2 bg-blue-600 text-white px-4 py-1.5 rounded hover:bg-blue-700 transition-colors">
                Chat IA
            </a>
        </div>

    </div>
</nav>

<div class="max-w-6xl mx-auto px-6 pb-10">
    {% block content %}
    {% endblock %}
</div>

</body>

</html>
