{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'chat.css' %}">
<script src="{% static 'chat.js' %}"></script>


<div id="layout">

<!-- sugestões -->

<div id="suggestions">

<div class="card-title">
Sugestões de pesquisa
</div>

<div class="card" onclick="sugerir('Quais tabelas de vendas existem?')">
🔍 Buscar datasets
</div>

<div class="card" onclick="sugerir('Explique o schema da tabela sales_table_0')">
🧩 Ver schema de uma tabela
</div>

<div class="card" onclick="sugerir('Qual tabela de vendas tem melhor qualidade de dados?')">
🧪 Melhor tabela de vendas
</div>

<div class="card" onclick="sugerir('Quais tabelas contêm dados financeiros?')">
💰 Dados financeiros
</div>

<div class="card" onclick="sugerir('Quais tabelas existem no catálogo de marketing?')">
📢 Dados de marketing
</div>


</div>


<!-- chat -->

<div id="chat-container">


<div id="chat-header" class="flex items-center justify-between px-4 py-2 bg-blue-600 text-white rounded-t">
    🤖
    <div class="space-x-2">
        <a href="/" class="bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-100">
            ← Voltar para a Home
        </a>
        <a href="/catalogo/" class="bg-white text-blue-600 px-3 py-1 rounded hover:bg-gray-100">
            → Ir para o Catálogo
        </a>
    </div>
</div>



<div id="chat-box"></div>

<div id="input-area">

<input
id="pergunta"
placeholder="Pergunte algo sobre os datasets..."
onkeydown="if(event.key==='Enter') enviarPergunta()"
/>

<button onclick="enviarPergunta()">Enviar</button>

</div>

</div>

</div>

{% endblock %}
